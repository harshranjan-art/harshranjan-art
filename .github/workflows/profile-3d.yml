name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: settings.json

      - name: Remove language pie chart and radar from SVG
        run: |
          python3 - <<'EOF'
          import re, sys

          with open("profile-3d-contrib/profile-custom.svg", "r", encoding="utf-8") as f:
              content = f.read()

          # Remove pie chart group (contains donut/language legend)
          content = re.sub(r'<g[^>]*>[^<]*(?:<(?!g)[^/][^>]*/>|<(?!g)[^/][^>]*>(?:(?!</).)*</[^g][^>]*>)*[^<]*(?:TypeScript|JavaScript|pie|donut)[^<]*(?:(?!</g>).|
)*?</g>', '', content, flags=re.DOTALL)

          # Remove radar chart group  
          content = re.sub(r'<g[^>]*>[^<]*(?:Commit|Repo|Issue|Review|PullReq)[^<]*(?:(?!</g>).|
)*?</g>', '', content, flags=re.DOTALL)

          with open("profile-3d-contrib/profile-custom.svg", "w", encoding="utf-8") as f:
              f.write(content)

          print("Done")
          EOF

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          if git commit -m "generated 3d contrib calendar"; then
            git push
          fi
